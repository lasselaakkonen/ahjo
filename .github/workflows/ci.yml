name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Materialize the embedded ahjo-mirror daemon binaries before vet/test.
      # They're gitignored (Go's per-build BuildID churns the bytes), so the
      # tree starts without them; `make generate-mirror` runs the same
      # `go generate` directives the host build does.
      - name: generate-mirror
        run: make generate-mirror

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt: unformatted files (run \`gofmt -w .\`):"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: govulncheck
        # Run govulncheck directly rather than golang/govulncheck-action@v1: that
        # action is a composite that runs its own pinned actions/checkout@v4.1.1,
        # which is (a) still node20 and (b) collides with the credentials our
        # top-level actions/checkout@v6 persists, yielding a "Duplicate header:
        # Authorization" 400 on PR fetches. Go is already set up above, so the
        # action's internal checkout + setup-go were pure redundancy.
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: go test -race
        run: go test -race ./...

      - name: make dist (cross-compile smoke test)
        run: make dist VERSION=ci-${{ github.sha }}
