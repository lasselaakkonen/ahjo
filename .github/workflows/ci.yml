name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      # Catch a stale embedded ahjo-mirror daemon binary before merge.
      # `go generate` rebuilds the linux-arm64 + linux-amd64 daemon binaries
      # under internal/ahjoruntime/feature/; if either differs from the
      # tree's checked-in copy, this fails with a clear non-empty diff.
      - name: go generate freshness
        run: |
          go generate ./...
          if ! git diff --exit-code; then
            echo "::error::embedded ahjo-mirror binaries are stale — run 'go generate ./...' locally and commit"
            exit 1
          fi
